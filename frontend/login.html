<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Auth Page</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card" id="auth-card">
        <div id="login-form">
          <h2>Welcome Back 👋</h2>

          <button class="google-btn" id="google-login">
            <svg
              class="google-icon"
              viewBox="0 0 48 48"
              aria-hidden="true"
              focusable="false"
            >
              <path
                fill="#EA4335"
                d="M24 9.5c3.16 0 6 1.09 8.24 3.23l6.16-6.16C34.56 3.06 29.63 1 24 1 14.62 1 6.52 6.38 2.56 14.22l7.12 5.53C11.4 13.25 17.18 9.5 24 9.5z"
              />
              <path
                fill="#4285F4"
                d="M46.98 24.55c0-1.64-.15-3.21-.41-4.73H24v9.04h12.94c-.56 3.02-2.25 5.58-4.8 7.31l7.37 5.72c4.31-3.97 6.8-9.82 6.8-17.34z"
              />
              <path
                fill="#FBBC05"
                d="M9.68 28.25a14.6 14.6 0 0 1 0-8.5l-7.12-5.53A22.98 22.98 0 0 0 0 24c0 3.68.88 7.16 2.44 10.28l7.24-6.03z"
              />
              <path
                fill="#34A853"
                d="M24 47c6.48 0 11.92-2.14 15.9-5.81l-7.37-5.72c-2.05 1.38-4.67 2.2-8.53 2.2-6.82 0-12.6-3.75-14.32-10.25l-7.24 6.03C6.42 41.24 14.52 47 24 47z"
              />
            </svg>
            Continue with Google
          </button>

          <div class="divider">
            <span>OR</span>
          </div>

          <input type="text" id="login-username" placeholder="Username" />

          <div class="password-wrapper">
            <input type="password" id="login-password" placeholder="Password" />
            <span class="toggle-password" id="toggle-login-password">👁</span>
          </div>

          <button class="primary-btn" id="manual-login">Login</button>

          <p class="switch-text">
            Don't have account? <span id="go-register">Register</span>
          </p>
        </div>

        <div id="register-form" class="hidden">
          <h2>Create Account 🚀</h2>

          <input type="text" id="register-username" placeholder="Username" />

          <div class="password-wrapper">
            <input
              type="password"
              id="register-password"
              placeholder="Password"
            />
            <span class="toggle-password" id="toggle-register-password"
              >👁</span
            >
          </div>

          <button class="primary-btn" id="register-btn">Register</button>

          <p class="switch-text">
            Already have account? <span id="go-login">Login</span>
          </p>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
